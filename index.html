<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나의 자기소개</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #eef6ff;
      color: #222;
      text-align: center;
      padding: 80px 20px;
    }

    h1 {
      color: #2563eb;
      font-size: 44px;
      margin-bottom: 20px;
    }

    p {
      font-size: 20px;
      line-height: 1.6;
      max-width: 560px;
      margin: 0 auto;
    }

    button {
      margin-top: 30px;
      padding: 14px 24px;
      border: none;
      border-radius: 6px;
      background-color: #2563eb;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background-color: #1d4ed8;
    }
  </style>
</head>
<body>
  <h1>안녕하세요, 저는 코딩을 배우는 중입니다!</h1>
  <p>저는 웹페이지 만들기를 연습하고 있습니다. HTML로 내용을 만들고, CSS로 보기 좋게 꾸미는 방법을 하나씩 배우는 중입니다.</p>
  <button onclick="alert('안녕하세요!')">문의하기</button>
</body>
</html>
