<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나의 첫 GitHub 연동 페이지</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      color: #222;
      background:
        radial-gradient(circle at top left, rgba(124, 184, 255, 0.26), transparent 32%),
        linear-gradient(135deg, #f7fbff 0%, #eef4f8 48%, #fff7f2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 36px 18px;
    }

    .page-card {
      width: min(100%, 720px);
      padding: 60px 54px;
      border: 1px solid rgba(255, 255, 255, 0.78);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.86);
      box-shadow:
        0 22px 54px rgba(43, 62, 80, 0.10),
        0 8px 22px rgba(43, 62, 80, 0.06);
      text-align: center;
      backdrop-filter: blur(16px);
    }

    h1 {
      color: #1f5fbf;
      font-size: 42px;
      line-height: 1.18;
      margin: 0 0 20px;
      text-align: center;
    }

    p {
      font-size: 19px;
      line-height: 1.72;
      max-width: 590px;
      margin: 0 auto 18px;
    }

    .intro {
      color: #334155;
      font-weight: 700;
    }

    .description {
      color: #475569;
      max-width: 560px;
    }

    button {
      margin-top: 30px;
      padding: 15px 32px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #274690, #1b264f);
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 14px 30px rgba(27, 38, 79, 0.22);
      transition:
        transform 0.2s ease,
        box-shadow 0.2s ease,
        filter 0.2s ease,
        background 0.2s ease;
    }

    button:hover {
      background: linear-gradient(135deg, #3158ad, #23346f);
      transform: translateY(-3px);
      box-shadow: 0 18px 38px rgba(27, 38, 79, 0.30);
      filter: brightness(1.05);
    }

    button:active {
      transform: translateY(0);
    }

    button:focus-visible {
      outline: 3px solid rgba(31, 95, 191, 0.28);
      outline-offset: 4px;
    }

    @media (max-width: 560px) {
      .page-card {
        padding: 44px 26px;
        border-radius: 22px;
      }

      h1 {
        font-size: 32px;
      }

      p {
        font-size: 17px;
      }
    }
  </style>
</head>
<body>
  <main class="page-card">
    <h1>나의 첫 GitHub 연동 페이지</h1>
    <p class="intro">이 페이지는 Codex와 GitHub로 관리되고 있습니다.</p>
    <p class="description">HTML로 구조를 만들고, CSS로 화면의 분위기와 읽기 흐름을 다듬고 있습니다.</p>
    <p class="description">작은 변경을 기록하며 웹페이지가 완성되어 가는 과정을 차근차근 배우는 중입니다.</p>
    <button onclick="alert('안녕하세요!')">문의하기</button>
  </main>
</body>
</html>
